<script>
  // When a dropdown opens, place a transparent overlay over the iframe
  // so clicks there still reach the parent document and close the dropdown.
  var overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000;display:none;';
  document.body.appendChild(overlay);

  $(document).on('show.bs.dropdown', function () {
    overlay.style.display = 'block';
  });

  $(document).on('hide.bs.dropdown', function () {
    overlay.style.display = 'none';
  });

  overlay.addEventListener('click', function () {
    $('.dropdown').removeClass('show');
    $('.dropdown-menu').removeClass('show');
    overlay.style.display = 'none';
  });
</script>
